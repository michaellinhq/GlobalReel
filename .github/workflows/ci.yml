name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile || echo "no lockfile yet"
      - run: pnpm -w lint || true
      - run: pnpm -w typecheck || true
      - run: pnpm -w test || true
      - run: pnpm -w build || true
  py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install uv
      - run: echo "python stubs only — no tests yet"
